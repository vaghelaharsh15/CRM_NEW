<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --crm-accent: #2563eb;
            --crm-accent-hover: #1d4ed8;
            --crm-sidebar: #0f172a;
            --crm-sidebar-light: #1e293b;
        }
        body {
            font-family: "DM Sans", system-ui, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            margin: 0;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: var(--crm-sidebar);
            color: white;
            padding: 1rem;
            overflow-y: auto;
        }
        .sidebar .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 0.5rem;
        }
        .sidebar .logo span:first-child {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .sidebar .nav-link {
            color: #cbd5e1;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: block;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: var(--crm-sidebar-light);
            color: white;
        }
        .sidebar .nav-link.active {
            background: var(--crm-accent);
        }
        .main-content {
            margin-left: 250px;
            padding: 1rem;
        }
        .page-title {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .page-subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        .card-crm {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .card-crm .card-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            padding: 1rem 1.25rem;
            border-radius: 1rem 1rem 0 0 !important;
        }
        .btn-crm-primary {
            background: var(--crm-accent);
            border-color: var(--crm-accent);
            font-weight: 600;
        }
        .btn-crm-primary:hover {
            background: var(--crm-accent-hover);
            border-color: var(--crm-accent-hover);
        }
        .table-crm thead th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #64748b;
            font-weight: 600;
            border-bottom-width: 1px;
        }
        .table-crm tbody td {
            vertical-align: middle;
            padding: 0.75rem;
        }
        .table-crm tbody tr {
            height: 60px; /* Fixed row height */
        }
        .table-wrap {
            border-radius: 0.5rem;
            overflow: hidden;
            max-height: 600px;
            overflow-y: auto;
        }
        .table-responsive-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .form-control:focus {
            border-color: var(--crm-accent);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.25);
        }
        .alert {
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <span>C</span>
            <span style="font-weight: 700;">CRM</span>
        </div>
        <nav>
            <a href="/crm" class="nav-link active">Customers</a>
            <a href="/crm/history" class="nav-link">Talk & remarks</a>
            <a href="/admin" class="nav-link">Admin</a>
            <button type="button" class="nav-link" style="border: none; background: none; width: 100%; text-align: left;" onclick="logout()">Log out</button>
        </nav>
    </div>

    <main class="main-content">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-4">
            <div>
                <h1 class="page-title h3 mb-1">Customers</h1>
                <p class="page-subtitle small mb-0">Add, search, and manage your contacts in one place.</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card card-crm">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span>Add new customer</span>
                        <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill fw-normal">Required fields</span>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3 align-items-end">
                            <div class="col-6 col-md-4 col-lg-2">
                                <label class="form-label small text-secondary mb-1">Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Full name">
                            </div>
                            <div class="col-6 col-md-4 col-lg-2">
                                <label class="form-label small text-secondary mb-1">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="email@…">
                            </div>
                            <div class="col-6 col-md-4 col-lg-2">
                                <label class="form-label small text-secondary mb-1">Phone</label>
                                <input type="text" class="form-control" id="phone" placeholder="Phone">
                            </div>
                            <div class="col-6 col-md-4 col-lg-2">
                                <label class="form-label small text-secondary mb-1">Who to talk to</label>
                                <input type="text" class="form-control" id="contact_person" placeholder="Contact person">
                            </div>
                            <div class="col-6 col-md-4 col-lg-2">
                                <label class="form-label small text-secondary mb-1">Follow-up date</label>
                                <input type="date" class="form-control" id="follow_up_date">
                            </div>
                            <div class="col-12 col-lg-2">
                                <button type="button" class="btn btn-crm-primary text-white w-100" onclick="addCustomer()">Add customer</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card card-crm">
                    <div class="card-header">Directory</div>
                    <div class="card-body p-4">
                        <div class="row g-2 align-items-end mb-3">
                            <div class="col-md-8 col-lg-7">
                                <label class="form-label small text-secondary mb-1">Search by name or phone</label>
                                <input type="search" class="form-control" id="search" placeholder="Type a name or phone number…">
                            </div>
                            <div class="col-md-4 col-lg-5">
                                <button type="button" class="btn btn-outline-secondary w-100" onclick="loadCustomers()">Search</button>
                            </div>
                        </div>
                        <p class="text-muted small mb-3 mb-md-2">Call notes and remarks are on the <a href="/crm/history" class="fw-semibold">Talk &amp; remarks</a> page.</p>
                        <div id="status" class="alert py-2 small mb-3 d-none" role="alert"></div>
                        <div class="table-responsive-wrap table-wrap border rounded-3 bg-white">
                            <table class="table table-hover table-crm align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Who to talk</th>
                                        <th>Date</th>
                                        <th class="text-end pe-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="table"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script>
        const API = window.location.origin;
        const token = localStorage.getItem("token");
        const statusBox = document.getElementById("status");

        if (!token) {
            window.location.href = "/";
        }

        function todayISO() {
            return new Date().toISOString().slice(0, 10);
        }

        // default follow-up date to today when adding a new customer
        document.getElementById("follow_up_date").value = todayISO();

        function authHeaders() {
            return {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            };
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }

        function setStatus(message, isError = true) {
            if (!message) {
                statusBox.classList.add("d-none");
                statusBox.textContent = "";
                return;
            }
            statusBox.classList.remove("d-none", "alert-danger", "alert-success", "alert-info");
            statusBox.classList.add(isError ? "alert-danger" : "alert-success");
            statusBox.textContent = message;
        }

        function escapeHtml(str) {
            return String(str == null ? "" : str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function formatApiError(data) {
            if (!data || data.detail == null) return "Request failed";
            const d = data.detail;
            if (typeof d === "string") return d;
            if (Array.isArray(d)) {
                const first = d[0];
                if (first && first.msg) return first.loc ? `${first.loc.join(".")}: ${first.msg}` : first.msg;
                return JSON.stringify(d);
            }
            if (typeof d === "object") return d.msg || JSON.stringify(d);
            return String(d);
        }

        function normalizeDate(value) {
            const v = (value || "").trim();
            if (!v) return "";
            if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
            if (/^\d{2}-\d{2}-\d{4}$/.test(v)) {
                const [dd, mm, yyyy] = v.split("-");
                return `${yyyy}-${mm}-${dd}`;
            }
            return v;
        }

        async function parseResponse(res) {
            const raw = await res.text();
            if (!raw) return {};
            try {
                return JSON.parse(raw);
            } catch {
                return { detail: raw };
            }
        }

        async function loadCustomers() {
            const search = document.getElementById("search").value.trim();
            setStatus("", false);

            try {
                const res = await fetch(API + "/customers?search=" + encodeURIComponent(search), {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }

                const data = await parseResponse(res);
                if (!res.ok) {
                    setStatus(formatApiError(data) || "Failed to load customers");
                    return;
                }

                let rows = "";
                data.forEach((c) => {
                    const safeDate = escapeHtml(normalizeDate(c.follow_up_date));
                    rows += `
                    <tr>
                        <td class="ps-3 text-secondary small">${c.id}</td>
                        <td><input class="form-control form-control-sm" value="${escapeHtml(c.name)}" id="name${c.id}"></td>
                        <td><input class="form-control form-control-sm" value="${escapeHtml(c.email)}" id="email${c.id}"></td>
                        <td><input class="form-control form-control-sm" value="${escapeHtml(c.phone)}" id="phone${c.id}"></td>
                        <td><input class="form-control form-control-sm" value="${escapeHtml(c.contact_person || "")}" id="contact_person${c.id}"></td>
                        <td><input class="form-control form-control-sm" value="${safeDate}" type="text" placeholder="yyyy-mm-dd" id="follow_up_date${c.id}"></td>
                        <td class="text-end pe-3 text-nowrap">
                            <a class="btn btn-sm btn-outline-secondary me-1" href="/crm/history?customer=${c.id}" title="Open remarks page">Remarks</a>
                            <button type="button" class="btn btn-sm btn-crm-primary text-white me-1" onclick="updateCustomer(${c.id})">Update</button>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.id})">Delete</button>
                        </td>
                    </tr>`;
                });
                document.getElementById("table").innerHTML = rows;
                if (data.length === 0) {
                    statusBox.classList.remove("d-none", "alert-danger", "alert-success");
                    statusBox.classList.add("alert-info");
                    statusBox.textContent = "No customers found.";
                } else {
                    statusBox.classList.add("d-none");
                    statusBox.textContent = "";
                }
            } catch (error) {
                setStatus("Network error while loading customers");
            }
        }

        async function addCustomer() {
            const payload = {
                name: document.getElementById("name").value.trim(),
                email: document.getElementById("email").value.trim(),
                phone: document.getElementById("phone").value.trim(),
                contact_person: document.getElementById("contact_person").value.trim(),
                follow_up_date: document.getElementById("follow_up_date").value
            };

            if (!payload.name || !payload.email || !payload.phone || !payload.contact_person || !payload.follow_up_date) {
                setStatus("Please fill all customer fields");
                return;
            }

            try {
                const res = await fetch(API + "/customers", {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                });

                const data = await parseResponse(res);
                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }
                if (!res.ok) {
                    setStatus(formatApiError(data) || "Failed to add customer");
                    return;
                }

                setStatus("Customer added successfully", false);
                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("contact_person").value = "";
                document.getElementById("follow_up_date").value = todayISO();
                await loadCustomers();
            } catch (error) {
                setStatus("Network error while adding customer");
            }
        }

        async function updateCustomer(id) {
            const payload = {
                name: document.getElementById("name"+id).value.trim(),
                email: document.getElementById("email"+id).value.trim(),
                phone: document.getElementById("phone"+id).value.trim(),
                contact_person: document.getElementById("contact_person"+id).value.trim(),
                follow_up_date: normalizeDate(document.getElementById("follow_up_date"+id).value)
            };

            if (!payload.name || !payload.email || !payload.phone || !payload.contact_person) {
                setStatus("Name, email, phone and contact person are required");
                return;
            }

            try {
                let res = await fetch(API + "/customers/" + id, {
                    method: "PUT",
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                });

                if (!res.ok && (res.status === 405 || res.status === 501)) {
                    res = await fetch(API + "/customers/" + id + "/update", {
                        method: "POST",
                        headers: authHeaders(),
                        body: JSON.stringify(payload)
                    });
                }

                const data = await parseResponse(res);
                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }
                if (!res.ok) {
                    setStatus(formatApiError(data) || "Failed to update customer");
                    return;
                }
                setStatus("Customer updated", false);
                await loadCustomers();
            } catch (error) {
                setStatus("Network error while updating customer");
            }
        }

        async function deleteCustomer(id) {
            try {
                let res = await fetch(API + "/customers/" + id, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + token }
                });

                if (!res.ok && (res.status === 405 || res.status === 404)) {
                    res = await fetch(API + "/customers/" + id + "/delete", {
                        method: "POST",
                        headers: authHeaders()
                    });
                }

                const data = await parseResponse(res);
                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }
                if (!res.ok) {
                    setStatus(formatApiError(data) || "Failed to delete customer");
                    return;
                }

                setStatus("Customer deleted", false);
                await loadCustomers();
            } catch (error) {
                setStatus("Network error while deleting customer");
            }
        }

        document.getElementById("search").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                loadCustomers();
            }
        });

        loadCustomers();
    </script>
</body>
</html>
