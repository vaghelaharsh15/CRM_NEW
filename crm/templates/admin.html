<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crm-accent: #2563eb;
            --crm-accent-hover: #1d4ed8;
            --crm-sidebar: #0f172a;
            --crm-sidebar-light: #1e293b;
        }
        body {
            font-family: "DM Sans", system-ui, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            margin: 0;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: var(--crm-sidebar);
            color: white;
            padding: 1rem;
            overflow-y: auto;
        }
        .sidebar .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 0.5rem;
        }
        .sidebar .logo span:first-child {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .sidebar .nav-link {
            color: #cbd5e1;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: block;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: var(--crm-sidebar-light);
            color: white;
        }
        .sidebar .nav-link.active {
            background: var(--crm-accent);
        }
        .main-content {
            margin-left: 250px;
            padding: 1rem;
        }
        .page-title {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
        }
        .stat-card h3 {
            margin: 0;
            font-size: 0.875rem;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 2rem;
            margin: 0.5rem 0;
            font-weight: 700;
        }
        .table-crm thead th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #64748b;
            font-weight: 600;
            border-bottom-width: 1px;
        }
        .table-crm tbody td {
            vertical-align: middle;
            padding: 0.75rem;
        }
        .btn-crm-primary {
            background: var(--crm-accent);
            border-color: var(--crm-accent);
            font-weight: 600;
        }
        .btn-crm-primary:hover {
            background: var(--crm-accent-hover);
            border-color: var(--crm-accent-hover);
        }
        .alert {
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <span>CRM</span>
            <span>Customer Relationship Management</span>
        </div>
        <nav>
            <a href="/crm" class="nav-link">Customers</a>
            <a href="/crm_history" class="nav-link">Talk & remarks</a>
            <a href="/admin" class="nav-link active">Admin Panel</a>
            <a href="/" class="nav-link" onclick="logout()">Logout</a>
        </nav>
    </div>
    <div class="main-content">
        <h1 class="page-title">Admin Panel</h1>

        <div id="adminError" class="alert alert-danger py-2 small d-none" role="alert"></div>

        <div class="stats" id="stats"></div>

        <div class="row">
            <div class="col-12">
                <h2>Users</h2>
                <div class="table-responsive">
                    <table class="table table-crm">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Admin</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <h2>Customers</h2>
                <div class="table-responsive">
                    <table class="table table-crm">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Contact Person</th>
                                <th>Follow-up Date</th>
                            </tr>
                        </thead>
                        <tbody id="customers-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <h2>Interactions</h2>
                <div class="table-responsive">
                    <table class="table table-crm">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Customer ID</th>
                                <th>Talked With</th>
                                <th>Interaction Date</th>
                                <th>Remark</th>
                                <th>Created At</th>
                            </tr>
                        </thead>
                        <tbody id="interactions-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script>
        const API = window.location.origin;
        const token = localStorage.getItem("token");
        const adminError = document.getElementById("adminError");
        if (!token) window.location.href = "/";

        function showError(msg) {
            if (!msg) msg = "Admin panel error";
            adminError.textContent = msg;
            adminError.classList.remove("d-none");
        }

        async function fetchJson(path) {
            const r = await fetch(`${API}${path}`, {
                headers: { "Authorization": `Bearer ${token}` },
            });
            if (r.status === 401 || r.status === 403) {
                localStorage.removeItem("token");
                window.location.href = "/";
            }
            const raw = await r.text();
            try {
                return raw ? JSON.parse(raw) : {};
            } catch {
                return { detail: raw || "Request failed" };
            }
        }

        async function checkAdmin() {
            adminError.classList.add("d-none");
            const r = await fetch(`${API}/admin/me`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (!r.ok) {
                localStorage.removeItem("token");
                window.location.href = "/";
                return;
            }
            const raw = await r.text();
            let user = {};
            try {
                user = raw ? JSON.parse(raw) : {};
            } catch {
                user = { detail: raw };
            }
            window.__IS_ADMIN__ = !!user.is_admin;
            if (!window.__IS_ADMIN__) {
                showError("You are logged in, but you are not admin. Admin actions are disabled.");
            }
            try {
                await loadStats();
                await loadUsers();
                await loadCustomers();
                await loadInteractions();
            } catch (e) {
                showError("Failed to load admin data. Check console for details.");
                console.error(e);
            }
        }

        async function loadStats() {
            const stats = await fetchJson("/admin/stats");
            document.getElementById("stats").innerHTML = `
                <div class="stat-card">
                    <h3>Total Customers</h3>
                    <div class="number">${stats.total_customers}</div>
                </div>
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <div class="number">${stats.total_users}</div>
                </div>
                <div class="stat-card">
                    <h3>Total Interactions</h3>
                    <div class="number">${stats.total_interactions}</div>
                </div>
            `;
        }

        async function loadUsers() {
            const users = await fetchJson("/admin/users");
            const tbody = document.getElementById("users-table");
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.is_admin ? "✓ Yes" : "No"}</td>
                    <td>
                        ${window.__IS_ADMIN__ && !u.is_admin ? `<button class="btn btn-crm-primary btn-sm me-1" onclick="makeAdmin(${u.id})">Make Admin</button>` : ""}
                        ${window.__IS_ADMIN__ ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Delete</button>` : ""}
                    </td>
                </tr>
            `).join("");
        }

        async function loadCustomers() {
            const customers = await fetchJson("/admin/customers");
            const tbody = document.getElementById("customers-table");
            tbody.innerHTML = customers.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.phone}</td>
                    <td>${c.contact_person}</td>
                    <td>${c.follow_up_date}</td>
                </tr>
            `).join("");
        }

        async function loadInteractions() {
            const interactions = await fetchJson("/admin/interactions");
            const tbody = document.getElementById("interactions-table");
            tbody.innerHTML = interactions.map(i => `
                <tr>
                    <td>${i.id}</td>
                    <td>${i.customer_id}</td>
                    <td>${i.talked_with}</td>
                    <td>${i.interaction_date}</td>
                    <td>${i.remark}</td>
                    <td>${i.created_at}</td>
                </tr>
            `).join("");
        }

        async function makeAdmin(userId) {
            if (!window.__IS_ADMIN__) {
                showError("Only admin can promote users.");
                return;
            }
            await fetch(`${API}/admin/users/${userId}/make-admin`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}` }
            });
            loadUsers();
        }

        async function deleteUser(userId) {
            if (!window.__IS_ADMIN__) {
                showError("Only admin can delete users.");
                return;
            }
            if (confirm("Delete this user?")) {
                await fetch(`${API}/admin/users/${userId}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });
                loadUsers();
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }

        checkAdmin();
    </script>
</body>
</html>
