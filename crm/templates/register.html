<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --crm-accent: #2563eb;
            --crm-accent-hover: #1d4ed8;
        }
        body {
            font-family: "DM Sans", system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #312e81 100%);
        }
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        }
        .auth-brand {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--crm-accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.25rem;
        }
        .btn-crm-primary {
            background: var(--crm-accent);
            border-color: var(--crm-accent);
            font-weight: 600;
            padding: 0.65rem 1rem;
        }
        .btn-crm-primary:hover {
            background: var(--crm-accent-hover);
            border-color: var(--crm-accent-hover);
        }
        .form-control:focus {
            border-color: var(--crm-accent);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="container" style="max-width: 440px;">
            <div class="card auth-card">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="auth-brand">C</div>
                        <div>
                            <h1 class="h4 mb-0 fw-bold">Create account</h1>
                            <p class="text-muted small mb-0">Get started with your CRM in seconds</p>
                        </div>
                    </div>

                    <div id="message" class="alert py-2 small d-none" role="alert"></div>

                    <form id="registerForm" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-semibold text-secondary">Username</label>
                            <input type="text" class="form-control form-control-lg" id="username" placeholder="Your name" required autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-semibold text-secondary">Email</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="you@company.com" required autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Choose a strong password" required autocomplete="new-password">
                        </div>
                        <button type="submit" id="registerBtn" class="btn btn-crm-primary btn-lg w-100 text-white">Register</button>
                    </form>

                    <p class="text-center text-muted small mt-4 mb-0">
                        Already have an account? <a href="/" class="fw-semibold text-decoration-none">Sign in</a>
                    </p>
                </div>
            </div>
            <p class="text-center text-white-50 small mt-3 mb-0">&copy; CRM — Customer management</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script>
        const API = window.location.origin;
        const messageBox = document.getElementById("message");

        function showMessage(text, isError) {
            if (!text) {
                messageBox.classList.add("d-none");
                messageBox.textContent = "";
                return;
            }
            messageBox.classList.remove("d-none", "alert-danger", "alert-success");
            messageBox.classList.add(isError ? "alert-danger" : "alert-success");
            messageBox.textContent = text;
        }

        async function registerUser(e) {
            if (e) e.preventDefault();
            showMessage("", true);

            const payload = {
                username: document.getElementById("username").value.trim(),
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            if (!payload.username || !payload.email || !payload.password) {
                showMessage("Please fill all fields.", true);
                return;
            }

            try {
                const res = await fetch(API + "/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const raw = await res.text();
                let data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch {
                    data = { detail: raw || "Server error" };
                }

                if (!res.ok) {
                    if (Array.isArray(data.detail)) {
                        showMessage(data.detail[0]?.msg || "Registration failed", true);
                    } else {
                        showMessage(data.detail || "Registration failed", true);
                    }
                    return;
                }

                showMessage("Success! Redirecting to sign in…", false);
                setTimeout(() => { window.location.href = "/"; }, 1000);
            } catch (err) {
                showMessage("Cannot connect to server. Please try again.", true);
            }
        }

        document.getElementById("registerForm").addEventListener("submit", registerUser);
    </script>
</body>
</html>
